show:
  - pari
  - sage
  - magma

prompt:
  sage:   'sage'
  pari:   'gp'
  magma:  'magma'

logo:
  sage: <img src ="https://www.sagemath.org/pix/sage_logo_new.png" width = "50px">
  pari: <img src = "https://pari.math.u-bordeaux.fr/logo/Logo%20Couleurs/Logo_PARI-GP_Couleurs_L150px.png" width="50px">
  magma: <img src = "https://i.stack.imgur.com/0468s.png" width="50px">

comment:
  sage: |
    #
  pari: |
    \\
  magma: |
    //

not-implemented:
  sage: |
    # (not yet implemented)
  pari: |
    \\\\ (not yet implemented)
  magma: |
    // (not yet implemented)

header:
  pari: |
    \\ Warning: in Pari all modular forms belong
    \\ to a space which has to be computed

dimensions-spaces:
  comment: Dimensions subspaces of M_{k}({N},chi)
  pari: |
    [N,k,chi] = [{N},{k},Mod({conrey_index},{N})]
    mfdim([N,k,chi],4) \\ all space
    mfdim([N,k,chi],3) \\ Eisenstein
    mfdim([N,k,chi],1) \\ Cusps
    mfdim([N,k,chi],0) \\ New

initialize-newspace-common: &initialize-newspace-common
  comment: Compute space of new eigenforms
  pari: |
    [N,k,chi] = [{N},{k},Mod({conrey_index},{N})]
    mf = mfinit([N,k,chi],0)
    lf = mfeigenbasis(mf)
  magma: |
    // Please install CHIMP (https://github.com/edgarcosta/CHIMP) if you want to run this code
    chi := DirichletCharacter("{N}.{conrey_index}");
    S:= CuspForms(chi, {k});
    N := Newforms(S);

initialize-newspace-weight-1:
  <<: *initialize-newspace-common
  sage: |
    from sage.modular.dirichlet import DirichletCharacter
    H = DirichletGroup({N}, base_ring=CyclotomicField({sage_zeta_order}))
    chi = DirichletCharacter(H, H._module({sage_genvalues}))
    B = ModularForms(chi, 1).cuspidal_submodule().basis()
    N = [B[i] for i in range(len(B))]

initialize-newspace-weight-not-1:
  <<: *initialize-newspace-common
  sage: |
    from sage.modular.dirichlet import DirichletCharacter
    H = DirichletGroup({N}, base_ring=CyclotomicField({sage_zeta_order}))
    chi = DirichletCharacter(H, H._module({sage_genvalues}))
    N = Newforms(chi, {k}, names="a") 

relative_polynomial:
  sage: K.relative_polynomial()

newform:
  comment: select newform
  sage: |
    {sage_traces}
    f = next(g for g in N if [g.coefficient(i+1).trace() for i in range({sage_trace_bound})] == traces)
  pari: |
    {gp_traces}
    abstrace(a,d) = my(s=1); while(type(a) == "t_POLMOD", s *= poldegree(a.mod); a = trace(a)); a*d/s
    tracevec(g,n) = my(p=mfparams(g), v=mfcoefs(g,n)); vector(n, i, abstrace(v[i+1], poldegree(p[4])*poldegree(p[5])))
    f = [g | g <- lf, tracevec(g,#traces) == traces][1]
  magma: |
    {magma_traces}
    D := NewformDecomposition(NewSubspace(CuspidalSubspace(ModularSymbols(chi, {k}, -1))));
    f := [d : d in D | [Integers()|Trace(Trace(Coefficient(e,j))) : j in [1..#traces]] eq traces where e := qEigenform(d, #traces+1)][1];

coeff-field:
  comment: Coefficient field, relative polynomial
  pari: |
    f.mod \\ as an extension of the cyclotomic field Q(t)/Phi

coefficient_field:
  sage: |
    K = f.hecke_eigenvalue_field() # note that sage often uses an isomorphic number field

defining-polynomial:
  comment: defining polynomial
  pari: |
    f.mod \\ as an extension of the character field

qexp:
  comment: q-expansion
  sage: |
    f.q_expansion() # note that sage often uses an isomorphic number field
  pari: |
    mfcoefs(f, 20)
  magma: |
    qEigenform(f, 20);

embeddings:
  comment: embeddings in the coefficient field
  pari: |
    mfembed(f)

absolute_polynomial:
  sage: K.absolute_polynomial()

l-function:
  comment: L function, special value at s=1
  pari: |
    L = lfunmf(mf,f);
    lfun(L,1)

# Code snippet tests for newform pages; both labels are in spaces with
# several newform orbits, so they exercise the trace-based selection
# (for 37.2.a the Pari/GP eigenbasis order differs from the LMFDB order)
snippet_test:
  test37_2_a_a:
    label: 37.2.a.a
    langs:
      - sage
      - gp
    url: ModularForm/GL2/Q/holomorphic/download_code_newform/37.2.a.a/{lang}
  test95_1_d_a:
    label: 95.1.d.a
    langs:
      - gp
    url: ModularForm/GL2/Q/holomorphic/download_code_newform/95.1.d.a/{lang}
